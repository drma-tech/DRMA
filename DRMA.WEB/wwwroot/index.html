<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" />

    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="manifest" href="manifest.webmanifest" />

    <link rel="stylesheet" href="css/app.min.css" />
    <link rel="stylesheet" href="css/custom-app.min.css" />
    <link rel="stylesheet" href="DRMA.WEB.styles.css" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon/icon-192.png" />

    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <script type="importmap"></script>

    <script src="package/bowser/es5.min.js"></script> <!--https://www.jsdelivr.com/package/npm/bowser - 2.14.1-->

    <script src="js/app-version.js"></script>
    <script src="js/main.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/sentry.js"></script>
    <script type="module" src="js/events.js"></script>
    <script type="module" src="js/services.js"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-41Q6D56912"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>

        <div class="loading-message">
            Loading the necessary components. Please wait...
        </div>
        <div class="loading-secondary">
            If loading fails, it's usually due to a slow connection or system/browser restrictions. Try reloading the page or reopening the app.
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <button onclick="location.reload()">Reload</button>
        <span class="dismiss">🗙</span>
    </div>

    <noscript>
        <div style="background: #fff3cd; color: #856404; padding: 1em; border: 1px solid #ffeeba; text-align: center;">
            This site requires JavaScript to function properly. Please enable JavaScript in your browser.
        </div>
    </noscript>

    <div id="toast-stack"></div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        if (typeof Promise.withResolvers !== "function") {
            Promise.withResolvers = function () {
                let resolve, reject;
                const promise = new Promise((res, rej) => {
                    resolve = res;
                    reject = rej;
                });
                return { promise, resolve, reject };
            };
        }
    </script>
    <script src="_content/Toolbelt.Blazor.PWA.Updater.Service/script.min.js"></script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js" autostart="false"></script>
    <script src="https://js.sentry-cdn.com/9d67a029559a76d507d4437b586e778f.min.js" crossorigin="anonymous"></script>
    <script>
        try {
            if (window.Blazor) {
                Blazor.start({
                    configureRuntime: runtime => runtime.withConfig({
                        loadAllSatelliteResources: window.appConfig.isPrerendering
                    })
                })
            }
            else {
                const toast = document.createElement("div");
                toast.className = "toast";
                toast.textContent = "The app could not be started due to an unexpected failure. Try refreshing the page, reopening the app, disabling strict content blockers, or using the latest version of a modern browser.";

                const stack = document.getElementById("toast-stack");
                stack.appendChild(toast);

                setTimeout(() => {
                    toast.remove();
                }, 10000);
            }
        } catch (error) {
            Sentry.captureException(error);
        }
    </script>

    <script type="module" src="js/init.js"></script>
</body>
</html>
